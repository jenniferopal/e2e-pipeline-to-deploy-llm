apiVersion: apps/v1
kind: Deployment
metadata:
  name : "llm-app-deployment"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: llm-app
  template:
    metadata:
      labels:
        app: llm-app
    spec:
      containers:
      - name: llm-app
        image: iamjenniferopal/llm-app:latest
        ports:
        - containerPort: 80